apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: hello-world

build:
  artifacts:
    - image: hello-world
      docker:
        dockerfile: Dockerfile
      # context is the directory containing this skaffold.yaml
      context: .

manifests:
  rawYaml:
    - k8s/deployment.yaml
    - k8s/service.yaml

portForward:
  - resourceType: Service
    resourceName: hello-world
    port: 8080
    localPort: 9001

profiles:
  - name: dev
    # Uses the base manifests — APP_ENV=dev is set in deployment.yaml
  - name: test
    manifests:
      rawYaml:
        - k8s/deployment-test.yaml
        - k8s/service.yaml
